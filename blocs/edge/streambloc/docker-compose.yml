services:
  jellyfin:
    image: jellyfin/jellyfin:${JELLYFIN_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-streambloc}-jellyfin
    restart: unless-stopped

    # Bind to the Tiny LAN IP for local-network access only.
    # Do not publish this port directly to the internet.
    ports:
      - "${JELLYFIN_BIND_IP:-127.0.0.1}:${JELLYFIN_HTTP_PORT:-8096}:8096/tcp"

    environment:
      TZ: ${TZ:-UTC}
      JELLYFIN_PublishedServerUrl: "http://${JELLYFIN_BIND_IP:-127.0.0.1}:${JELLYFIN_HTTP_PORT:-8096}"

    volumes:
      - ${STREAMBLOC_ROOT:-/srv/streambloc}/jellyfin/config:/config
      - ${STREAMBLOC_ROOT:-/srv/streambloc}/jellyfin/cache:/cache
      - ${MEDIA_ROOT:-/srv/media}:/media:ro

    # Optional DLNA discovery. Keep disabled until needed.
    # network_mode: host

